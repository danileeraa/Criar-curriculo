<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Currículo - CurriculoBuilder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;500;600;700&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Merriweather:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .form-section { scroll-margin-top: 80px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">
  <header class="bg-white border-b border-slate-100 h-16 shrink-0 no-print">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="p-2 bg-blue-600 text-white rounded-xl shadow-md shadow-blue-100">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </span>
        <span class="font-bold text-slate-800 tracking-tight text-sm sm:text-base">CurriculoBuilder</span>
        <span class="text-[10px] bg-slate-50 text-slate-400 border border-slate-200 px-2 py-0.5 rounded-md font-bold uppercase tracking-wider hidden sm:inline-block">Editor</span>
      </div>
      <div class="flex items-center gap-2 sm:gap-3">
        <span class="hidden sm:flex items-center gap-2 text-xs text-slate-400">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-semibold text-xs" id="userAvatar"></span>
          <span id="userName"></span>
        </span>
        <a href="dashboard.html" class="text-xs font-semibold text-slate-600 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-xl transition-colors">Dashboard</a>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto no-print" style="padding-bottom:80px">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 builder-container">
        <!-- Form -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 builder-form">
          <h2 class="text-lg font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100">Informações Pessoais</h2>

          <div class="space-y-5">
            <div class="form-group">
              <label class="block text-sm font-medium text-slate-700 mb-1">Nome completo *</label>
              <input id="fullName" placeholder="Maria Silva Santos" class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="form-group">
                <label class="block text-sm font-medium text-slate-700 mb-1">Título profissional</label>
                <input id="professionalTitle" placeholder="Desenvolvedora Full Stack" class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
              </div>
              <div class="form-group">
                <label class="block text-sm font-medium text-slate-700 mb-1">Foto</label>
                <div class="flex items-center gap-3">
                  <div class="w-12 h-12 rounded-full bg-slate-100 overflow-hidden flex items-center justify-center text-xl" id="photoPreview">
                    <span class="text-slate-400">👤</span>
                  </div>
                  <label class="text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg cursor-pointer transition-colors">
                    <input type="file" id="photoInput" accept="image/*" hidden> Upload
                  </label>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="block text-sm font-medium text-slate-700 mb-1">Resumo profissional</label>
              <textarea id="summary" rows="3" placeholder="Profissional com X anos de experiência em..." class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm resize-none"></textarea>
            </div>
          </div>

          <!-- Contact -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              Contato
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="form-group"><label class="block text-sm font-medium text-slate-700 mb-1">Email</label><input id="email" type="email" placeholder="maria@email.com" class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"></div>
              <div class="form-group"><label class="block text-sm font-medium text-slate-700 mb-1">Telefone</label><input id="phone" placeholder="(11) 99999-8888" class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"></div>
              <div class="form-group"><label class="block text-sm font-medium text-slate-700 mb-1">Endereço</label><input id="address" placeholder="São Paulo, SP" class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"></div>
              <div class="form-group"><label class="block text-sm font-medium text-slate-700 mb-1">Site / Portfólio</label><input id="website" placeholder="https://meusite.com" class="block w-full px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"></div>
            </div>
          </div>

          <!-- Social -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
              Redes Sociais
            </h3>
            <div id="socialContainer"></div>
            <button onclick="addSocial()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Rede Social</button>
          </div>

          <!-- Education -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
              Formação Acadêmica
            </h3>
            <div id="educationContainer"></div>
            <button onclick="addEducation()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Formação</button>
          </div>

          <!-- Experience -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              Experiência Profissional
            </h3>
            <div id="experienceContainer"></div>
            <button onclick="addExperience()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Experiência</button>
          </div>

          <!-- Skills -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
              Habilidades
            </h3>
            <div id="skillsContainer"></div>
            <button onclick="addSkill()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Habilidade</button>
          </div>

          <!-- Languages -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              Idiomas
            </h3>
            <div id="languagesContainer"></div>
            <button onclick="addLanguage()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Idioma</button>
          </div>

          <!-- Certifications -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
              Certificações
            </h3>
            <div id="certsContainer"></div>
            <button onclick="addCertification()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Certificação</button>
          </div>

          <!-- Projects -->
          <div class="mt-8">
            <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
              Projetos
            </h3>
            <div id="projectsContainer"></div>
            <button onclick="addProject()" class="mt-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">+ Adicionar Projeto</button>
          </div>
        </div>

        <!-- Preview -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm builder-preview">
          <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-3 preview-controls">
            <select id="templateSelect" class="text-xs px-2.5 py-1.5 border border-slate-200 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="desenvolvedor">Desenvolvedor</option>
              <option value="designer">Designer</option>
              <option value="advocacia">Advocacia</option>
              <option value="medicina">Medicina</option>
              <option value="engenharia">Engenharia</option>
              <option value="marketing">Marketing</option>
              <option value="professor">Professor</option>
              <option value="administrativo">Administrativo</option>
              <option value="jovem-aprendiz">Jovem Aprendiz</option>
              <option value="executivo">Executivo</option>
            </select>
            <select id="fontSelect" class="text-xs px-2.5 py-1.5 border border-slate-200 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option>Inter</option><option>Roboto</option><option>Open Sans</option><option>Lato</option><option>Montserrat</option><option>Poppins</option><option>Raleway</option><option>Playfair Display</option><option>Merriweather</option><option>Georgia</option><option>Times New Roman</option><option>Arial</option>
            </select>
          </div>
          <div class="p-4 preview-frame" id="previewFrame">
            <div class="preview-content template-desenvolvedor" id="previewContent" style="font-family:'Inter',sans-serif;min-height:600px">
              <div style="text-align:center;padding:80px 20px;color:#94a3b8">
                <p style="font-size:1.1rem">Preencha os dados ao lado</p>
                <p style="font-size:0.9rem;margin-top:8px">O preview aparecerá aqui</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Save Bar -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 sm:px-6 py-3 flex items-center justify-between no-print z-40">
    <div class="flex items-center gap-2 text-xs text-slate-400">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Dados salvos localmente
    </div>
    <div class="flex items-center gap-2" id="saveBarActions">
      <button onclick="window.location.href='dashboard.html'" class="text-xs font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">Voltar</button>
          
      <button id="exportImgBtn" class="text-xs font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">PNG</button>
      <button id="exportPdfBtn" class="text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">Salvar PDF</button>
      <button id="saveBtn" class="text-xs font-semibold text-white bg-emerald-600 hover:bg-emerald-700 px-4 py-1.5 rounded-lg transition-colors cursor-pointer">Salvar</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/export.js"></script>
  <script src="js/builder.js"></script>
</body>
</html>
