<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CurriculoBuilder - Gerador de Currículos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .password-strength { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
    .password-strength-bar { height: 100%; border-radius: 2px; width: 0; transition: all 0.3s; }
    .password-strength.weak .password-strength-bar { width: 25%; background: #ef4444; }
    .password-strength.medium .password-strength-bar { width: 50%; background: #f59e0b; }
    .password-strength.strong .password-strength-bar { width: 75%; background: #10b981; }
    .password-strength.very-strong .password-strength-bar { width: 100%; background: #059669; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 mb-4">
      <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    </div>
    <h2 class="text-3xl font-bold tracking-tight text-slate-900">CurriculoBuilder</h2>
    <p class="mt-2 text-sm text-slate-600" id="authSubtitle">Faça login para gerenciar e editar seus currículos</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl shadow-slate-100 rounded-2xl border border-slate-100 sm:px-10">

      <div id="loginError" class="mb-4 p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl hidden items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></span>
        <span id="loginErrorText"></span>
      </div>
      <div id="registerError" class="mb-4 p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl hidden items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></span>
        <span id="registerErrorText"></span>
      </div>

      <!-- Login Form -->
      <form class="space-y-5" id="loginForm">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <input type="email" id="loginEmail" required placeholder="seu@email.com" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <input type="password" id="loginPassword" required placeholder="Sua senha" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
          </div>
        </div>
        <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors cursor-pointer">
          Entrar no Painel
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </button>
      </form>

      <!-- Register Form -->
      <form class="space-y-5 hidden" id="registerForm">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nome completo</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <input type="text" id="regName" required placeholder="Seu nome completo" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <input type="email" id="regEmail" required placeholder="seu@email.com" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm" oninput="checkPasswordStrength(this.value)">
            <div class="password-strength" id="passwordStrength"><div class="password-strength-bar"></div></div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar senha</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
            <input type="password" id="regConfirm" required placeholder="Repita a senha" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
          </div>
        </div>
        <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors cursor-pointer">
          Criar Minha Conta
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </button>
      </form>

      <div class="mt-6 border-t border-slate-100 pt-5 text-center">
        <button type="button" id="toggleAuthMode" class="text-sm font-medium text-blue-600 hover:text-blue-700 focus:outline-none cursor-pointer">
          Não tem uma conta? Cadastre-se
        </button>
      </div>
    </div>

    <div class="mt-6 text-center text-xs text-slate-400 flex flex-col items-center gap-1">
      <p class="flex items-center gap-1.5">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
        Dados armazenados localmente com criptografia
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    Auth.redirectIfAuthenticated('dashboard.html');

    let isLogin = true;

    document.getElementById('toggleAuthMode').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('loginForm').classList.toggle('hidden');
      document.getElementById('registerForm').classList.toggle('hidden');
      document.getElementById('authSubtitle').textContent = isLogin
        ? 'Faça login para gerenciar e editar seus currículos'
        : 'Crie uma conta para salvar seu histórico de currículos';
      document.getElementById('toggleAuthMode').textContent = isLogin
        ? 'Não tem uma conta? Cadastre-se'
        : 'Já possui uma conta? Faça login';
      document.getElementById('loginError').classList.add('hidden');
      document.getElementById('registerError').classList.add('hidden');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const errorText = document.getElementById('loginErrorText');

      if (!email || !password) {
        errorText.textContent = 'Preencha todos os campos.';
        errorEl.classList.remove('hidden');
        return;
      }

      const result = await Auth.login(email, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        errorText.textContent = result.error;
        errorEl.classList.remove('hidden');
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      const errorEl = document.getElementById('registerError');
      const errorText = document.getElementById('registerErrorText');

      if (!name || !email || !password || !confirm) {
        errorText.textContent = 'Preencha todos os campos.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (password.length < 6) {
        errorText.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errorText.textContent = 'As senhas não conferem.';
        errorEl.classList.remove('hidden');
        return;
      }

      const result = await Auth.register(email, password, name);
      if (result.success) {
        const loginResult = await Auth.login(email, password);
        if (loginResult.success) {
          window.location.href = 'dashboard.html';
        }
      } else {
        errorText.textContent = result.error;
        errorEl.classList.remove('hidden');
      }
    });

    function checkPasswordStrength(password) {
      const el = document.getElementById('passwordStrength');
      if (!password) { el.className = 'password-strength'; return; }
      let score = 0;
      if (password.length >= 6) score++;
      if (password.length >= 10) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      if (score <= 1) el.className = 'password-strength weak';
      else if (score <= 2) el.className = 'password-strength medium';
      else if (score <= 3) el.className = 'password-strength strong';
      else el.className = 'password-strength very-strong';
    }
  </script>
</body>
</html>
