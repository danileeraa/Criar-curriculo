<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CurriFlow - Gerador de Currículos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <svg fill="none" viewBox="0 0 24 24" stroke="var(--primary)">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1>CurriFlow</h1>
      <p class="subtitle">Gerador de Currículos Profissionais</p>

      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="loginPassword" placeholder="Sua senha">
        </div>
        <div id="loginError" style="color:var(--danger);font-size:0.85rem;margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center" onclick="handleLogin()">Entrar</button>
        <div class="auth-footer">
          Não tem conta? <a href="#" onclick="showRegister()">Cadastre-se</a>
        </div>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="regName" placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" oninput="checkPasswordStrength(this.value)">
          <div class="password-strength" id="passwordStrength"><div class="password-strength-bar"></div></div>
        </div>
        <div class="form-group">
          <label>Confirmar senha</label>
          <input type="password" id="regConfirm" placeholder="Repita a senha">
        </div>
        <div id="registerError" style="color:var(--danger);font-size:0.85rem;margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center" onclick="handleRegister()">Criar Conta</button>
        <div class="auth-footer">
          Já tem conta? <a href="#" onclick="showLogin()">Fazer login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    Auth.redirectIfAuthenticated('dashboard.html');

    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('loginError').style.display = 'none';
    }

    function showLogin() {
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerError').style.display = 'none';
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');

      if (!email || !password) {
        errorEl.textContent = 'Preencha todos os campos.';
        errorEl.style.display = 'block';
        return;
      }

      const result = await Auth.login(email, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      const errorEl = document.getElementById('registerError');

      if (!name || !email || !password || !confirm) {
        errorEl.textContent = 'Preencha todos os campos.';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        errorEl.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = 'As senhas não conferem.';
        errorEl.style.display = 'block';
        return;
      }

      const result = await Auth.register(email, password, name);
      if (result.success) {
        const loginResult = await Auth.login(email, password);
        if (loginResult.success) {
          window.location.href = 'dashboard.html';
        }
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
      }
    }

    function checkPasswordStrength(password) {
      const el = document.getElementById('passwordStrength');
      if (!password) { el.className = 'password-strength'; return; }

      let score = 0;
      if (password.length >= 6) score++;
      if (password.length >= 10) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      if (score <= 1) el.className = 'password-strength weak';
      else if (score <= 2) el.className = 'password-strength medium';
      else if (score <= 3) el.className = 'password-strength strong';
      else el.className = 'password-strength very-strong';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
      document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
      document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
      document.getElementById('regConfirm').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
    });
  </script>
</body>
</html>
